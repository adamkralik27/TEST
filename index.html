<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontaktní formulář</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .formular {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
    }

    h1 {
      margin-bottom: 24px;
      font-size: 24px;
      color: #333;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #555;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 20px;
      transition: border 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #4f46e5;
    }

    textarea {
      height: 120px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #4338ca;
    }

    .zprava {
      display: none;
      margin-top: 16px;
      padding: 12px;
      background: #d1fae5;
      color: #065f46;
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="formular">
    <h1>Kontaktní formulář</h1>

    <label for="jmeno">Jméno</label>
    <input type="text" id="jmeno" placeholder="Zadej své jméno">

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="tvuj@email.cz">

    <label for="zprava">Zpráva</label>
    <textarea id="zprava" placeholder="Napiš svou zprávu..."></textarea>

    <button onclick="odeslat()">Odeslat</button>

    <div class="zprava" id="potvrzeni">
      ✅ Zpráva byla odeslána!
    </div>
  </div>

  <script>
    function odeslat() {
      const jmeno = document.getElementById('jmeno').value;
      const email = document.getElementById('email').value;
      const zprava = document.getElementById('zprava').value;

      if (!jmeno || !email || !zprava) {
        alert('Vyplň prosím všechna pole.');
        return;
      }

      document.getElementById('potvrzeni').style.display = 'block';
    }
  </script>

</body>
</html>
